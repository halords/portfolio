<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <clipPath id="circle">
      <circle cx="16" cy="16" r="16"/>
    </clipPath>
  </defs>
  <circle cx="16" cy="16" r="16" fill="#3d7068"/>
  <g clip-path="url(#circle)">
    <!-- Left vertical bar of H -->
    <rect x="7" y="7" width="4" height="18" fill="#ffffff"/>
    <!-- Right vertical bar of H -->
    <rect x="21" y="7" width="4" height="18" fill="#ffffff"/>
    <!-- Angled crossbar of H -->
    <polygon points="11,13 21,16 21,19 11,16" fill="#ffffff"/>
    <!-- Gold corner accent -->
    <polygon points="26,0 32,0 32,6" fill="#b07d2e"/>
  </g>
</svg>
